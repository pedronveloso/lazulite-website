baseURL = 'https://lazulite.app'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
title = 'Lazulite App'
theme = "lazulite"

# Allow raw HTML in markdown
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[params.social]]
key = 0
name = "email"
url = "mailto:lazulite.app@example.com"
#icon = "fa-solid fa-envelope"

[params]
readingTime = false  # Show reading time on post page
published = false  # Show published data on post page
playStoreUrl = "https://play.google.com/store/apps/details?id=com.pedronveloso.lazulite"
socialImage = "/images/codecs-info-2.png"

[languages]
  [languages.en]
    languageCode = 'en-US'
    languageName = 'English'
    weight = 1
    title = 'Lazulite App'
    [languages.en.params]
      footerHtml = 'Lazulite App for Android'
      description = "Real-time Bluetooth audio codec inspection for Android. Monitor LDAC, aptX HD, AAC, SBC and more — see exactly what your wireless audio is doing."
      homeTitle = "Bluetooth Audio Codec Analyzer for Android | Lazulite App"
    [[languages.en.menu.header]]
      name = "Privacy Policy"
      weight = 0
      pageRef = "/privacy"
    [[languages.en.menu.header]]
      name = "FAQ"
      weight = 1
      pageRef = "/faq"

  [languages.es]
    languageCode = 'es-ES'
    languageName = 'Español'
    weight = 2
    title = 'Lazulite App'
    [languages.es.params]
      footerHtml = 'Lazulite App para Android'
      description = "Inspección en tiempo real de códecs de audio Bluetooth para Android. Supervisa LDAC, aptX HD, AAC, SBC y más para ver exactamente qué está haciendo tu audio inalámbrico."
      homeTitle = "Analizador de códecs Bluetooth para Android | Lazulite App"
    [[languages.es.menu.header]]
      name = "Privacidad"
      weight = 0
      pageRef = "/privacy"
    [[languages.es.menu.header]]
      name = "Preguntas frecuentes"
      weight = 1
      pageRef = "/faq"

  [languages.zh]
    languageCode = 'zh-CN'
    languageName = '简体中文'
    weight = 3
    title = 'Lazulite App'
    [languages.zh.params]
      footerHtml = '适用于 Android 的 Lazulite'
      description = "面向 Android 的实时蓝牙音频编解码器检测。监控 LDAC、aptX HD、AAC、SBC 等格式，准确查看无线音频的实际传输情况。"
      homeTitle = "Android 蓝牙音频编解码器分析工具 | Lazulite App"
    [[languages.zh.menu.header]]
      name = "隐私政策"
      weight = 0
      pageRef = "/privacy"
    [[languages.zh.menu.header]]
      name = "常见问题"
      weight = 1
      pageRef = "/faq"
