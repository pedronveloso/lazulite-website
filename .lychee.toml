# Lychee link checker configuration
# https://github.com/lycheeverse/lychee

# Mailto links are valid — don't attempt to check them
exclude = ["^mailto:"]

# Retry transient failures before reporting broken
max_retries = 3
timeout = 30

# Follow up to 5 redirects before flagging
max_redirects = 5

# Accept 2xx success codes + 429 Too Many Requests (rate limits we can't control)
accept = ["100..=103", "200..=299", "429"]

format = "compact"
