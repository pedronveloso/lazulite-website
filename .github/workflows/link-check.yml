name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly run to catch external link rot
  schedule:
    - cron: '0 8 * * 1'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            --root-dir "${{ github.workspace }}/public"
            --no-progress
            './public/**/*.html'
          fail: true
