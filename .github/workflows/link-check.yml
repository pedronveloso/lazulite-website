name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly run to catch external link rot
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.0'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            --root-dir "${{ github.workspace }}/public"
            --no-progress
            './public/**/*.html'
          fail: true
