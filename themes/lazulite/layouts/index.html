<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default .Site.Language.Lang }}">

<head>
    <title>
        {{ .Site.Params.homeTitle | default (printf "%s | %s" (i18n "home") .Site.Title) }}
    </title>

    {{ partial "head.html" . }}

</head>

<body>

    <div class="flexWrapper">
        {{ partial "header.html" . }}

        <div class="content vertical">
            <main class="main">
                <div class="indexWrapper">
                    {{ with .Site.GetPage "page" "_index.md" }}
                    {{ .Content }}
                    {{ end }}

                </div>
            </main>
        </div>


        {{ partial "footer.html" . }}
    </div>

</body>

</html>
